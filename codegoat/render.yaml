services:
  - type: web
    name: codegoat-api
    runtime: node
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: COMPOSIO_GITHUB_CALLBACK_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

  - type: web
    name: codegoat-web
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        sync: false
